name: outbox-saga-lab

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Kafka exposes only the in-network listener (29092) to other containers.
  # Host-side traffic reaches Kafka through the toxiproxy service below, which
  # owns host port 9092. PLAINTEXT_HOST advertises localhost:9092 so clients
  # come back through the proxy on every reconnect — making chaos toxics
  # persistent even after broker metadata refresh.
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # Toxiproxy sits between the host and Kafka. Default state: zero toxics, fully
  # transparent. Inject failures via `tools/chaos.sh` or the HTTP API on :8474.
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: toxiproxy
    command: ["-host=0.0.0.0", "-config=/etc/toxiproxy/proxies.json"]
    ports:
      - "9092:9092"   # kafka via toxiproxy (host clients use localhost:9092)
      - "8474:8474"   # toxiproxy admin HTTP API
    volumes:
      - ./tools/toxiproxy/proxies.json:/etc/toxiproxy/proxies.json:ro
    depends_on:
      kafka:
        condition: service_healthy

  # Visual topic browser. http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: outbox-saga-lab
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  orders-db:
    image: postgres:16-alpine
    container_name: orders-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
    volumes:
      - orders-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "orders"]
      interval: 5s
      timeout: 3s
      retries: 10

  payments-db:
    image: postgres:16-alpine
    container_name: payments-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
    volumes:
      - payments-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "payments"]
      interval: 5s
      timeout: 3s
      retries: 10

  inventory-db:
    image: postgres:16-alpine
    container_name: inventory-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
    volumes:
      - inventory-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "inventory"]
      interval: 5s
      timeout: 3s
      retries: 10

  delivery-db:
    image: postgres:16-alpine
    container_name: delivery-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: delivery
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: delivery
    volumes:
      - delivery-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "delivery"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  orders-data:
  payments-data:
  inventory-data:
  delivery-data:
